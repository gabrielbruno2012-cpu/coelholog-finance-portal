<!doctype html><html><head><meta charset='utf-8'><title>Alterar Recebíveis</title><link rel='stylesheet' href='/css/style.css'></head><body><script>document.addEventListener('DOMContentLoaded',function(){const user=JSON.parse(localStorage.getItem('user')||'null');if(!user){window.location='/';return;}if(user.role!=='financeiro'){alert('Acesso negado');window.location='/colaborador/dashboard.html';return;}});</script><div include-html="../components/sidebar_admin.html"></div><main class='main'><h2>Alterar Recebíveis</h2><div class='card'><table class='table' id='tbl'><thead><tr><th>ID</th><th>Usuário</th><th>Data</th><th>Valor</th><th>Tipo</th><th>Status</th><th>Ação</th></tr></thead><tbody></tbody></table></div></main><script>fetch('/components/sidebar.html').then(r=>r.text()).then(html=> document.getElementById('sidebar-container').innerHTML = html);async function load(){const res=await fetch('/api/recebiveis');const rows=await res.json();const tbody=document.querySelector('#tbl tbody');tbody.innerHTML='';rows.forEach(r=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${r.id}</td><td>${r.nome||r.usuario_id}</td><td><input type='date' id='d_${r.id}' value='${r.data||''}'></td><td><input id='v_${r.id}' value='${r.valor}'></td><td><input id='t_${r.id}' value='${r.tipo||''}'></td><td><select id='s_${r.id}'><option ${'${r.status}'}==='Pendente'?'selected':''}>Pendente</option><option ${'${r.status}'}==='Pago'?'selected':''}>Pago</option><option ${'${r.status}'}==='Reprovado'?'selected':''}>Reprovado</option></select></td><td><button class='btn' onclick='save(${r.id})'>Salvar</button></td>`;tbody.appendChild(tr);});}async function save(id){const data=document.getElementById('d_'+id).value;const valor=document.getElementById('v_'+id).value;const tipo=document.getElementById('t_'+id).value;const status=document.getElementById('s_'+id).value;const res=await fetch('/api/recebiveis/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({data,valor,tipo,status})});if(res.ok){alert('Atualizado');load();try{if(window.opener && window.opener.loadDashboard) window.opener.loadDashboard();}catch(e){}if(window.loadDashboard) window.loadDashboard();}else alert('Erro')}document.addEventListener('DOMContentLoaded',load);</script><script src="/js/include.js"></script></body></html>
