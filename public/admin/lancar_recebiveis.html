<!doctype html><html><head><meta charset='utf-8'><title>Lançar Recebíveis</title><link rel='stylesheet' href='/css/style.css'></head><body><script>document.addEventListener('DOMContentLoaded',function(){const user=JSON.parse(localStorage.getItem('user')||'null');if(!user){window.location='/';return;}if(user.role!=='financeiro'){alert('Acesso negado');window.location='/colaborador/dashboard.html';return;}});</script><div include-html="../components/sidebar_admin.html"></div><main class='main'><h2>Lançar Recebível</h2><div class='card'><select id='usuario' class='input'></select><input id='valor' class='input' placeholder='Valor'/><input id='data' class='input' placeholder='YYYY-MM-DD'/><input id='tipo' class='input' placeholder='Tipo'/><select id='status' class='input'><option>Pendente</option><option>Pago</option><option>Reprovado</option></select><br/><br/><button class='btn' onclick='lancar()'>Lançar</button><p id='msg' class='small'></p></div></main><script>fetch('/components/sidebar.html').then(r=>r.text()).then(html=> document.getElementById('sidebar-container').innerHTML = html);async function carregarUsuarios(){const res=await fetch('/api/usuarios');const rows=await res.json();document.getElementById('usuario').innerHTML = '<option value="">-- selecione --</option>'+rows.map(u=>`<option value="${u.id}">${u.nome||u.email}</option>`).join('');}async function lancar(){const usuario_id=document.getElementById('usuario').value;const valor=document.getElementById('valor').value;const data=document.getElementById('data').value;const tipo=document.getElementById('tipo').value;const status=document.getElementById('status').value;const res=await fetch('/api/recebiveis',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario_id,data,valor,tipo,status})});if(res.ok){document.getElementById('msg').innerText='Lançado';try{if(window.opener && window.opener.loadDashboard) window.opener.loadDashboard();}catch(e){}if(window.loadDashboard) window.loadDashboard();}else document.getElementById('msg').innerText='Erro'}document.addEventListener('DOMContentLoaded',carregarUsuarios);</script><script src="/js/include.js"></script></body></html>
