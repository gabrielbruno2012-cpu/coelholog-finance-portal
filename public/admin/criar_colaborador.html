<!doctype html><html><head><meta charset='utf-8'><title>Criar Colaborador</title><link rel='stylesheet' href='/css/style.css'></head><body><script>document.addEventListener('DOMContentLoaded',function(){const user=JSON.parse(localStorage.getItem('user')||'null');if(!user){window.location='/';return;}if(user.role!=='financeiro'){alert('Acesso negado');window.location='/colaborador/dashboard.html';return;}});</script><div include-html="../components/sidebar_admin.html"></div><main class='main'><h2>Criar Colaborador</h2><div class='card'><input id='nome' class='input' placeholder='Nome'/><input id='email' class='input' placeholder='Email'/><input id='senha' class='input' placeholder='Senha'/><select id='role' class='input'><option value='colaborador'>Colaborador</option><option value='prestador'>Prestador</option><option value='financeiro'>Financeiro</option></select><br/><br/><button class='btn' onclick='criar()'>Criar</button><p id='msg' class='small'></p></div><div class='card' id='lista'></div></main><script>fetch('/components/sidebar.html').then(r=>r.text()).then(html=> document.getElementById('sidebar-container').innerHTML = html);async function criar(){const nome=document.getElementById('nome').value;const email=document.getElementById('email').value;const senha=document.getElementById('senha').value;const role=document.getElementById('role').value;const res=await fetch('/api/usuarios',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,email,senha,role})});if(res.ok){document.getElementById('msg').innerText='Criado';carregar();}else{document.getElementById('msg').innerText='Erro'}}async function carregar(){const res=await fetch('/api/usuarios');const rows=await res.json();document.getElementById('lista').innerHTML = '<table class="table"><tr><th>ID</th><th>Nome</th><th>Email</th><th>Role</th></tr>'+rows.map(u=>`<tr><td>${u.id}</td><td>${u.nome}</td><td>${u.email}</td><td>${u.role}</td></tr>`).join('') + '</table>';}document.addEventListener('DOMContentLoaded',carregar);</script><script src="/js/include.js"></script></body></html>
