<!doctype html><html><head><meta charset='utf-8'><title>Alterar Empréstimos</title><link rel='stylesheet' href='/css/style.css'></head><body><script>document.addEventListener('DOMContentLoaded',function(){const user=JSON.parse(localStorage.getItem('user')||'null');if(!user){window.location='/';return;}if(user.role!=='financeiro'){alert('Acesso negado');window.location='/colaborador/dashboard.html';return;}});</script><div include-html="../components/sidebar_admin.html"></div><main class='main'><h2>Alterar Empréstimos</h2><div class='card'><table class='table' id='tbl'><thead><tr><th>ID</th><th>Usuário</th><th>Valor</th><th>Parcelas</th><th>Status</th><th>Data</th><th>Ação</th></tr></thead><tbody></tbody></table></div></main><script>fetch('/components/sidebar.html').then(r=>r.text()).then(html=> document.getElementById('sidebar-container').innerHTML = html);async function load(){const res=await fetch('/api/emprestimos');const rows=await res.json();const tbody=document.querySelector('#tbl tbody');tbody.innerHTML='';rows.forEach(r=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${r.id}</td><td>${r.nome||r.usuario_id}</td><td><input id='v_${r.id}' value='${r.valor}'></td><td><input id='p_${r.id}' value='${r.parcelamentos||0}'></td><td><select id='s_${r.id}'><option ${'${r.status}'}==='Em análise'?'selected':''}>Em análise</option><option ${'${r.status}'}==='Aprovado'?'selected':''}>Aprovado</option><option ${'${r.status}'}==='Reprovado'?'selected':''}>Reprovado</option><option ${'${r.status}'}==='Pago'?'selected':''}>Pago</option></select></td><td>${r.criado_em||''}</td><td><button class='btn' onclick='save(${r.id})'>Salvar</button></td>`;tbody.appendChild(tr);});}async function save(id){const status=document.getElementById('s_'+id).value;const valor=document.getElementById('v_'+id).value;const parcelamentos=document.getElementById('p_'+id).value;const res=await fetch('/api/emprestimos/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status,valor,parcelamentos})});if(res.ok){alert('Atualizado');load();}else alert('Erro')}document.addEventListener('DOMContentLoaded',load);</script><script src="/js/include.js"></script></body></html>
